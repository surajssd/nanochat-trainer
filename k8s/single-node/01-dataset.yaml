---
apiVersion: batch/v1
kind: Job
metadata:
  name: nanochat-01-dataset
  namespace: nanochat
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: nanochat
        image: quay.io/surajd/nanochat:latest
        args: ["dataset"]
        env:
        - name: DATASET_SHARDS
          value: "170"
        resources:
          limits:
            memory: "16Gi"
            cpu: "8"
          requests:
            memory: "8Gi"
            cpu: "4"
        volumeMounts:
        - name: nanochat-data
          mountPath: /data/nanochat
      volumes:
      - name: nanochat-data
        persistentVolumeClaim:
          claimName: nanochat-data
      nodeSelector:
        node.kubernetes.io/instance-type: Standard_ND96isr_H100_v5
