---
apiVersion: batch/v1
kind: Job
metadata:
  name: nanochat-07-report
  namespace: nanochat
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: nanochat
        image: quay.io/surajd/nanochat:latest
        args: ["report"]
        resources:
          limits:
            memory: "8Gi"
            cpu: "4"
          requests:
            memory: "4Gi"
            cpu: "2"
        volumeMounts:
        - name: nanochat-data
          mountPath: /data/nanochat
      volumes:
      - name: nanochat-data
        persistentVolumeClaim:
          claimName: nanochat-data
      nodeSelector:
        node.kubernetes.io/instance-type: Standard_ND96isr_H100_v5
